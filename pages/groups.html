<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Groupes — WC2026 Predictor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css_pages/css_groups.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">

</head>
<body>

<nav>
  <a class="nav-logo" href="../index.html">OhLeBut ⚽</a>
  <div class="nav-links">
    <a href="../index.html">Accueil</a>
    <a href="groups.html" class="active">Groupes</a>
    <a href="bracket.html">Bracket</a>
    <a href="model.html">Modèle</a>
    <a href="data.html">Données</a>
  </div>
</nav>

<div class="page-header">
  <h1>Phase de <span>Groupes</span></h1>
  <p>48 équipes · 12 groupes · 72 matchs — Classements & prédictions.</p>
</div>

<div class="filter-bar">
  <span class="filter-label">Groupe</span>
  <button class="filter-btn all-btn active" data-grp="ALL">Tous</button>
  <!-- Les boutons par groupe sont générés par JS -->
  <span id="groupFilterBtns"></span>
  <div class="mode-toggle" id="modeToggle">
    <button class="mode-btn active" id="btnPred" onclick="setMode('pred')">🔮 Prédictions</button>
    <button class="mode-btn" id="btnReal" onclick="setMode('real')">📊 Réel</button>
  </div>
</div>

<main class="main" id="mainContent">
  <div class="loading">Chargement des données…</div>
</main>

<script src="assets.js"></script>
<script>
let _mode = 'pred';  // 'pred' | 'real'
let _data = null;

function setMode(mode) {
  _mode = mode;
  document.getElementById('btnPred').classList.toggle('active', mode === 'pred');
  document.getElementById('btnReal').classList.toggle('active', mode === 'real');
  if (_data) renderAll(_data);
}

// ── Helpers ───────────────────────────────────────────────────────────────

function qualClass(qual, pos) {
  if (qual === '1ST')      return 'qual-1ST';
  if (qual === '2ND')      return 'qual-2ND';
  if (qual === '3RD_BEST' || pos === 3) return 'qual-3RD';
  return 'qual-OUT';
}
function qualLabel(qual, pos) {
  if (qual === '1ST')      return '1er';
  if (qual === '2ND')      return '2e';
  if (qual === '3RD_BEST') return '3e*';
  if (pos === 3)           return '3e';
  return 'Éliminé';
}
function probColor(p) {
  if (p >= .7) return '#16A34A';
  if (p >= .4) return '#F97316';
  return '#EF4444';
}
function fmtDate(str) {
  if (!str) return '';
  const d = new Date(str);
  return d.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short' });
}

// ── renderStandings ───────────────────────────────────────────────────────

function renderStandings(teams) {
  const isReal = _mode === 'real';

  // En mode réel, trier par classement réel si disponible
  const sorted = isReal && teams[0]?.real
    ? [...teams].sort((a, b) => (a.real.pos || 99) - (b.real.pos || 99))
    : teams;

  return `
  <div class="standings-card">
    <table class="standings-table">
      <thead>
        <tr>
          <th style="width:38%">Équipe</th>
          <th>J</th><th>V</th><th>N</th><th>D</th>
          <th>BP</th><th>BC</th><th>Diff</th><th>Pts</th>
          <th>Statut</th>
          ${isReal ? '' : '<th style="min-width:100px">Prob. Qual.</th>'}
        </tr>
      </thead>
      <tbody>
        ${sorted.map(t => {
          const r     = isReal && t.real ? t.real : null;
          const pts   = r ? r.pts   : t.pts;
          const played= r ? r.played: t.played;
          const w     = r ? r.w     : t.w;
          const d     = r ? r.d     : t.d;
          const l     = r ? r.l     : t.l;
          const gf    = r ? r.gf    : t.gf;
          const ga    = r ? r.ga    : t.ga;
          const gd    = r ? r.gd    : t.gd;
          const qual  = r ? r.qual  : t.qual;
          const pos   = r ? r.pos   : t.pos;
          const gdStr = gd >= 0 ? '+' + gd : String(gd);

          // Badge prédit vs réel
          let predBadge = '';
          if (isReal && t.real) {
            const predPos = t.pos;
            const realPos = t.real.pos;
            if (predPos === realPos) {
              predBadge = `<span class="pred-badge correct">✓ Prédit ${predPos}e</span>`;
            } else {
              predBadge = `<span class="pred-badge wrong">✗ Prédit ${predPos}e</span>`;
            }
          }

          const pctQual = Math.round((t.pq || 0) * 100);
          const qc = qualClass(qual, pos);

          return `<tr>
            <td>
              <div class="team-cell">
                <span class="pos-num">${pos}</span>
                ${flag(t.name, 22, 15, 'team-flag-img')}
                <span class="team-cell-name">${t.name}</span>
                ${predBadge}
              </div>
            </td>
            <td>${played}</td>
            <td>${w}</td>
            <td>${d}</td>
            <td>${l}</td>
            <td>${gf}</td>
            <td>${ga}</td>
            <td style="font-weight:600;color:${gd>=0?'var(--grass)':'#EF4444'}">${gdStr}</td>
            <td class="pts-cell">${pts}</td>
            <td><span class="qual-badge ${qc}">${qualLabel(qual, pos)}</span></td>
            ${isReal ? '' : `
            <td>
              <div class="prob-bar-wrap">
                <div class="prob-bar">
                  <div class="prob-bar-fill" style="width:${pctQual}%;background:${probColor(t.pq)}"></div>
                </div>
                <span class="prob-val">${pctQual}%</span>
              </div>
            </td>`}
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>`;
}

// ── renderMatches ─────────────────────────────────────────────────────────
// Inchangé — act_h/act_a/act_res déjà gérés dans les deux modes

function renderMatches(matches) {
  const isReal = _mode === 'real';
  return `
  <div class="matches-card">
    <div class="matches-card-header">
      <span>Matchs</span>
      <small>${isReal ? 'Score réel · Prédit · Probas' : 'Prédictions · Probas'}</small>
    </div>
    ${matches.map(m => {
      const hasResult = m.act_h !== null && m.act_a !== null;
      const correct   = hasResult && m.act_res === m.pred_res;
      const phPct = Math.round(m.ph * 100);
      const pdPct = Math.round(m.pd * 100);
      const paPct = Math.round(m.pa * 100);

      let scoreMain, scoreLabel;

      if (!isReal) {
        // Mode prédiction : score prédit uniquement
        scoreMain  = `<div class="score-actual" style="color:#A8A29E">${m.pred_h} – ${m.pred_a}</div>`;
        scoreLabel = `<div class="score-pred">Prédit</div>`;
      } else if (hasResult) {
        // Mode réel : vrai score + comparaison prédit
        scoreMain  = `<div class="score-actual">${m.act_h} – ${m.act_a}</div>`;
        scoreLabel = `<div class="score-pred ${correct ? 'correct' : ''}">Prédit: ${m.pred_h}–${m.pred_a} ${correct ? '✓' : '✗'}</div>`;
      } else {
        // Mode réel mais pas encore joué
        scoreMain  = `<div class="score-actual" style="color:#A8A29E">${m.pred_h} – ${m.pred_a}</div>`;
        scoreLabel = `<div class="score-pred">Prédit</div>`;
      }

      return `
      <div class="match-row">
        <div class="match-date-col">${fmtDate(m.date)}</div>
        <div class="match-home">${flag(m.home, 22, 15, 'team-flag-img')}<span>${m.home}</span></div>
        <div class="match-score-block">
          ${scoreMain}${scoreLabel}
          <div class="match-proba">
            <div class="mp-h" style="width:${phPct}%"></div>
            <div class="mp-d" style="width:${pdPct}%"></div>
            <div class="mp-a" style="width:${paPct}%"></div>
          </div>
        </div>
        <div class="match-away">${flag(m.away, 22, 15, 'team-flag-img')}<span>${m.away}</span></div>
        <div style="text-align:right;font-size:.7rem;color:#A8A29E;white-space:nowrap;line-height:1.6">
          <span style="color:var(--grass)">${phPct}%</span>
          <span style="color:var(--gold);margin:0 2px">${pdPct}%</span>
          <span style="color:#EF4444">${paPct}%</span>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

// ── renderBestThirds ──────────────────────────────────────────────────────

function renderBestThirds(best3Pred, best3Real) {
  const isReal  = _mode === 'real';
  const useReal = isReal && best3Real && best3Real.length > 0;
  const list    = useReal ? best3Real : best3Pred;
  const subtitle = useReal
    ? '12 équipes · Classement réel final'
    : '12 équipes · Les 8 premières sont qualifiées pour le tableau final';

  return `
  <div class="best3-section fade-in" id="best3-section">
    <div class="section-title-row">
      <div class="section-title">Classement des 3es</div>
      <div class="section-sub">${subtitle}</div>
    </div>
    <div class="best3-table-wrap">
      <table class="best3-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Groupe</th>
            <th style="text-align:left">Équipe</th>
            <th>Pts</th><th>Diff</th><th>BP</th><th>FIFA</th>
            ${useReal ? '<th>Statut</th>' : '<th>Prob. qual.</th><th>Statut</th>'}
          </tr>
        </thead>
        <tbody>
          ${list.map((t, i) => {
            const qualified = useReal ? t.qualified : i < 8;
            const gd = (t.gd >= 0 ? '+' : '') + t.gd;
            const cutoff = !useReal && i === 8
              ? '<tr class="cutoff-row"><td colspan="9"><span>── Éliminés ──</span></td></tr>'
              : '';

            // Badge comparaison prédit vs réel
            let cmpBadge = '';
            if (useReal) {
              const predEntry = best3Pred.find(p => p.id === t.id);
              if (predEntry) {
                const predQual = predEntry.rank <= 8;
                cmpBadge = qualified === predQual
                  ? '<span class="pred-badge correct">✓ Prédit</span>'
                  : '<span class="pred-badge wrong">✗ Prédit</span>';
              }
            }

            const qualBadge = useReal
              ? `<td><span class="qual-badge ${qualified ? 'qual-3RD' : 'qual-OUT'}">${qualified ? '3e ✓' : 'Élim.'}</span> ${cmpBadge}</td>`
              : `<td>
                  <div class="prob-bar-wrap">
                    <div class="prob-bar">
                      <div class="prob-bar-fill" style="width:${Math.round((t.prob||0)*100)}%;background:${qualified?'var(--grass)':'#E7E5E4'}"></div>
                    </div>
                    <span class="prob-val">${Math.round((t.prob||0)*100)}%</span>
                  </div>
                </td>
                <td><span class="qual-badge ${qualified ? 'qual-3RD' : 'qual-OUT'}">${qualified ? '3e* ✓' : 'Élim.'}</span></td>`;

            return cutoff + `<tr class="${qualified ? 'row-qualified' : 'row-out'}">
              <td class="b3-rank">${t.rank || i+1}</td>
              <td class="b3-group">Grp. ${t.group || t.group_name}</td>
              <td class="b3-name-cell">${flag(t.name, 22, 15, 'team-flag-img')}<span>${t.name}</span></td>
              <td class="b3-num">${t.pts}</td>
              <td class="b3-num" style="color:${t.gd>=0?'var(--grass)':'#EF4444'}">${gd}</td>
              <td class="b3-num">${t.gf}</td>
              <td class="b3-num" style="color:#A8A29E">#${t.fifa_rank || t.fifa_ranking}</td>
              ${qualBadge}
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
    ${!useReal ? `<p style="font-size:.75rem;color:#A8A29E;margin-top:.75rem;padding-left:.25rem">
      * Classement déterminé par pts → diff. de buts → buts marqués → classement FIFA.
      Probabilités issues des simulations Monte Carlo.
    </p>` : ''}
  </div>`;
}

// ── renderGroup & renderAll ───────────────────────────────────────────────

function renderGroup(grpKey, grp) {
  return `
  <div class="group-block fade-in" data-group="${grpKey}" id="grp-${grpKey}">
    <div class="group-header-row">
      <div class="group-letter-tag">GROUPE ${grpKey}</div>
      <div class="group-header-line"></div>
    </div>
    ${renderStandings(grp.teams)}
    ${renderMatches(grp.matches)}
  </div>`;
}

function renderAll(data) {
  const main    = document.getElementById('mainContent');
  const groups  = data.groups;
  const grpKeys = Object.keys(groups).sort();
  const best3Pred = data.best_thirds || [];
  const best3Real = data.best_thirds_real || [];

  // En mode réel sans données réelles → message
  if (_mode === 'real' && best3Real.length === 0) {
    const hasAnyReal = Object.values(groups).some(g =>
      g.teams.some(t => t.real !== null && t.real !== undefined)
    );
    if (!hasAnyReal) {
      main.innerHTML = `<div class="loading" style="padding:3rem;text-align:center">
        <p style="font-size:1.1rem;margin-bottom:.75rem">⏳ Les résultats réels ne sont pas encore disponibles.</p>
        <p style="color:#78716C;font-size:.88rem">Repassez après la fin de la phase de groupes.</p>
      </div>`;
      return;
    }
  }

  let html = '';
  grpKeys.forEach(k => { html += renderGroup(k, groups[k]); });
  html += renderBestThirds(best3Pred, best3Real);
  main.innerHTML = html;

  // Scroll animations
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: 0.05 });
  document.querySelectorAll('.fade-in').forEach(el => obs.observe(el));
}

// ── Filtres de groupe ─────────────────────────────────────────────────────

function filterGroup(grp) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if (grp === 'ALL') {
    document.querySelector('.all-btn').classList.add('active');
    document.querySelectorAll('.group-block').forEach(el => el.style.display = '');
    const s3 = document.getElementById('best3-section');
    if (s3) s3.style.display = '';
  } else {
    document.querySelector(`[data-grp="${grp}"]`).classList.add('active');
    document.querySelectorAll('.group-block').forEach(el => {
      el.style.display = el.dataset.group === grp ? '' : 'none';
    });
    const s3 = document.getElementById('best3-section');
    if (s3) s3.style.display = 'none';
    const target = document.getElementById('grp-' + grp);
    if (target) setTimeout(() => target.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
  }
}

// ── Init ──────────────────────────────────────────────────────────────────

async function init() {
  const main = document.getElementById('mainContent');
  try {
    const res = await fetch('../data/groups.json');
    if (!res.ok) throw new Error(res.status);
    _data = await res.json();
  } catch(e) {
    main.innerHTML = `<div class="loading" style="padding:3rem;text-align:center">
      <p style="font-size:1.1rem;margin-bottom:.75rem">❌ Les données ne sont pas disponibles.</p>
      <p style="color:#78716C;font-size:.88rem">Veuillez réessayer plus tard.</p>
    </div>`;
    return;
  }

  // Boutons filtre de groupe
  const btnContainer = document.getElementById('groupFilterBtns');
  Object.keys(_data.groups).sort().forEach(k => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = k;
    btn.dataset.grp = k;
    btn.addEventListener('click', () => filterGroup(k));
    btnContainer.appendChild(btn);
  });

  renderAll(_data);
}

document.querySelector('.all-btn').addEventListener('click', () => filterGroup('ALL'));

init();
</script>
</body>
</html>
